<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Influencer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="wrap">
        <h1>Influencer Dashboard</h1>
        <p class="sub">Enter a Facebook, Instagram, YouTube or TikTok URL</p>

        <form action="/followers" method="GET">
            <div class="row">
                <input type="text" name="url" placeholder="https://www.instagram.com/natgeo" />
                <button type="submit">Search</button>
            </div>
        </form>

        {% if error %}
        <div class="err">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
