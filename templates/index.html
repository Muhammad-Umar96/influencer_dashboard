<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Influencer Dashboard</title>
</head>
<body>

    <h2>Influencer Dashboard</h2>
    <p>Enter a Facebook, Instagram, YouTube or TikTok page URL</p>

    <form action="/followers" method="GET">
        <input 
            type="text" 
            name="url" 
            placeholder="Facebook, Instagram, YouTube or TikTok URL" 
            style="width: 500px; font-size: 16px;" 
        />
        <button type="submit">Get Stats</button>
    </form>

</body>
</html>
