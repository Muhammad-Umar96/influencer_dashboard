<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook Follower Checker</title>
</head>
<body>

    <h2>Facebook Follower Checker</h2>

    <form action="/followers" method="GET">
        <input type="text" name="url" placeholder="https://www.facebook.com/page-name", style="width: 400px; font-size: 16px;" />
        <button type="submit">Get Stats</button>
    </form>

</body>
</html>
